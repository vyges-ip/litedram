name: Upstream Sync

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-sync even if upstream.commit already matches the resolved version tag'
        required: false
        default: false
        type: boolean
  push:
    paths:
      - 'upstream.yaml'
      - '.github/workflows/upstream-sync.yml'

jobs:
  sync:
    uses: vyges-ip/.github/.github/workflows/upstream-sync-vendor-drop.yml@main
    with:
      force: ${{ inputs.force || false }}
    permissions:
      contents: write
      models: read
